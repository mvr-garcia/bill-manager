version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: payables-api-db
    environment:
      POSTGRES_USER: payables_user
      POSTGRES_PASSWORD: payables_password
      POSTGRES_DB: payables_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payables_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
